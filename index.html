<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Nap</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            transition: background-color 1s; /* 背景変化をスムーズに */
        }
        #timer {
            font-size: 80px;
            font-weight: 200;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 85%;
            max-width: 320px;
        }
        .row { display: flex; gap: 8px; }
        button {
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 12px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            flex: 1;
        }
        button.active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }
        #startBtn { background: #fff; color: #000; border: none; margin-top: 10px; font-weight: bold; font-size: 16px; }
        #testBtn { border: 1px solid #d32f2f; color: #d32f2f; font-size: 12px; margin-top: 20px; }
        .status-msg { margin-top: 20px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

    <div id="timer">15:00</div>

    <div class="controls">
        <div class="row">
            <button class="time-btn" data-time="300">5分</button>
            <button class="time-btn" data-time="600">10分</button>
            <button class="time-btn active" data-time="900">15分</button>
            <button class="time-btn" data-time="1200">20分</button>
        </div>
        <div class="row">
            <button id="sharpBtn" class="active">スッキリ</button>
            <button id="gentleBtn">ゆったり</button>
        </div>
        <button id="startBtn">意識をOFFにする</button>
        <button id="testBtn">動作テスト（5秒）</button>
    </div>

    <script>
        let timeLeft = 900;
        let timerId = null;
        let alarmType = 'sharp';
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(freq, type, duration, vol = 0.2) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const display = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const testBtn = document.getElementById('testBtn');
        
        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                timeLeft = parseInt(btn.dataset.time);
                updateDisplay();
            };
        });

        function updateDisplay() {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        const sharpBtn = document.getElementById('sharpBtn');
        const gentleBtn = document.getElementById('gentleBtn');
        sharpBtn.onclick = () => { alarmType = 'sharp'; sharpBtn.classList.add('active'); gentleBtn.classList.remove('active'); };
        gentleBtn.onclick = () => { alarmType = 'gentle'; gentleBtn.classList.add('active'); sharpBtn.classList.remove('active'); };

        startBtn.onclick = () => { initAudio(); toggleTimer(false); };
        testBtn.onclick = () => { initAudio(); timeLeft = 5; updateDisplay(); toggleTimer(true); };

        function toggleTimer(isTest) {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                startBtn.innerText = "再開する";
            } else {
                document.body.style.backgroundColor = "#0a0a0a"; // 背景を戻す
                playSound(110, 'sine', 2, 0.1); // 開始音
                startBtn.innerText = isTest ? "テスト中..." : "休息中...";
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        timerId = null;
                        finish();
                    }
                }, 1000);
            }
        }

        function finish() {
            // 背景色を変えて視覚的に通知
            document.body.style.backgroundColor = "#1a1a2e";
            
            if (alarmType === 'sharp') {
                // スッキリ：高めの音を4回
                for(let i=0; i<4; i++) {
                    setTimeout(() => playSound(880, 'triangle', 0.5, 0.3), i * 600);
                }
            } else {
                // ゆったり：低い音を長く
                playSound(330, 'sine', 4, 0.3);
            }
            
            // 音が鳴り終わる頃にアラートを出す（iOS対策）
            setTimeout(() => {
                alert("リセット完了。ギアを上げましょう。");
                startBtn.innerText = "意識をOFFにする";
                document.body.style.backgroundColor = "#0a0a0a";
            }, 2500);
        }
    </script>
</body>
</html>
