<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Nap</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            transition: background-color 0.5s;
        }
        #timer { font-size: 80px; font-weight: 200; letter-spacing: 5px; margin-bottom: 20px; }
        .controls { display: flex; flex-direction: column; gap: 12px; width: 85%; max-width: 320px; z-index: 10; }
        .row { display: flex; gap: 8px; }
        button { background: transparent; border: 1px solid #333; color: #666; padding: 12px; font-size: 14px; cursor: pointer; border-radius: 8px; flex: 1; transition: 0.3s; }
        button.active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }
        #startBtn { background: #fff; color: #000; border: none; margin-top: 10px; font-weight: bold; font-size: 16px; }
        #startBtn.alarm-active { background: #d32f2f; color: #fff; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        /* 評価エリア */
        #ratingArea { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #ratingArea h3 { margin-bottom: 30px; font-weight: 300; }
        
        /* 履歴エリア */
        #historyArea { width: 85%; max-width: 320px; margin-top: 50px; border-top: 1px solid #222; padding-top: 20px; }
        #historyArea h4 { font-size: 12px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        .log-item { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #111; }
    </style>
</head>
<body>

    <div id="timer">15:00</div>

    <div class="controls">
        <div class="row">
            <button class="time-btn" data-time="300">5分</button>
            <button class="time-btn" data-time="600">10分</button>
            <button class="time-btn active" data-time="900">15分</button>
            <button class="time-btn" data-time="1200">20分</button>
        </div>
        <div class="row">
            <button id="sharpBtn" class="active">スッキリ</button>
            <button id="gentleBtn">ゆったり</button>
        </div>
        <button id="startBtn">意識をOFFにする</button>
    </div>

    <div id="historyArea">
        <h4>LOGS</h4>
        <div id="historyList"></div>
    </div>

    <div id="ratingArea">
        <h3>コンディションはどう？</h3>
        <div class="row" style="width: 80%;">
            <button onclick="saveLog('😊 最高')">😊 最高</button>
            <button onclick="saveLog('😐 普通')">😐 普通</button>
            <button onclick="saveLog('😴 まだ眠い')">😴 まだ眠い</button>
        </div>
    </div>

    <script>
        let timeLeft = 900;
        let timerId = null;
        let alarmIntervalId = null;
        let alarmType = 'sharp';
        let audioCtx = null;
        let isAlarming = false;
        let wakeLock = null;

        const display = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const ratingArea = document.getElementById('ratingArea');
        const historyList = document.getElementById('historyList');

        // 音声・画面維持の初期化
        async function initSystems() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // 画面が消えるのを防ぐ（サポートされているブラウザのみ）
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }

        function playSound(freq, type, duration, vol = 0.2) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // 時間選択
        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.onclick = () => {
                if (isAlarming) return;
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                timeLeft = parseInt(btn.dataset.time);
                updateDisplay();
            };
        });

        function updateDisplay() {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // アラームタイプ
        document.getElementById('sharpBtn').onclick = function() { alarmType = 'sharp'; this.classList.add('active'); document.getElementById('gentleBtn').classList.remove('active'); };
        document.getElementById('gentleBtn').onclick = function() { alarmType = 'gentle'; this.classList.add('active'); document.getElementById('sharpBtn').classList.remove('active'); };

        startBtn.onclick = () => {
            initSystems();
            if (isAlarming) stopAlarm();
            else toggleTimer();
        };

        function toggleTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                startBtn.innerText = "再開する";
            } else {
                document.body.style.backgroundColor = "#0a0a0a";
                playSound(110, 'sine', 2, 0.1); 
                startBtn.innerText = "休息中...";
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        timerId = null;
                        startAlarm();
                    }
                }, 1000);
            }
        }

        function startAlarm() {
            isAlarming = true;
            startBtn.innerText = "アラームを止める";
            startBtn.classList.add('alarm-active');
            document.body.style.backgroundColor = "#1a1a2e";
            alarmIntervalId = setInterval(() => {
                if (alarmType === 'sharp') playSound(880, 'triangle', 0.5, 0.3);
                else playSound(330, 'sine', 1.5, 0.3);
            }, alarmType === 'sharp' ? 800 : 2000);
        }

        function stopAlarm() {
            isAlarming = false;
            clearInterval(alarmIntervalId);
            startBtn.classList.remove('alarm-active');
            ratingArea.style.display = 'flex'; // 評価画面へ
        }

        // ログ保存
        function saveLog(status) {
            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
            const log = { date: timeStr, status: status };
            
            let logs = JSON.parse(localStorage.getItem('napLogs') || '[]');
            logs.unshift(log);
            localStorage.setItem('napLogs', JSON.stringify(logs.slice(0, 5))); // 直近5件保存
            
            renderLogs();
            ratingArea.style.display = 'none';
            resetApp();
        }

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('napLogs') || '[]');
            historyList.innerHTML = logs.map(l => `<div class="log-item"><span>${l.date}</span><span>${l.status}</span></div>`).join('');
        }

        function resetApp() {
            const activeTime = document.querySelector('.time-btn.active').dataset.time;
            timeLeft = parseInt(activeTime);
            updateDisplay();
            startBtn.innerText = "意識をOFFにする";
            document.body.style.backgroundColor = "#0a0a0a";
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
        }

        // 初期表示でログを読み込む
        renderLogs();
    </script>
</body>
</html>
