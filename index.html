<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Nap</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            transition: background-color 0.5s;
        }
        #timer {
            font-size: 80px;
            font-weight: 200;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 85%;
            max-width: 320px;
        }
        .row { display: flex; gap: 8px; }
        button {
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 12px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            flex: 1;
        }
        button.active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }
        #startBtn { background: #fff; color: #000; border: none; margin-top: 10px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        /* アラーム鳴動中のボタン色 */
        #startBtn.alarm-active {
            background: #d32f2f;
            color: #fff;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        #testBtn { border: 1px solid #444; color: #444; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="timer">15:00</div>

    <div class="controls">
        <div class="row">
            <button class="time-btn" data-time="300">5分</button>
            <button class="time-btn" data-time="600">10分</button>
            <button class="time-btn active" data-time="900">15分</button>
            <button class="time-btn" data-time="1200">20分</button>
        </div>
        <div class="row">
            <button id="sharpBtn" class="active">スッキリ</button>
            <button id="gentleBtn">ゆったり</button>
        </div>
        <button id="startBtn">意識をOFFにする</button>
        <button id="testBtn">動作テスト（5秒）</button>
    </div>

    <script>
        let timeLeft = 900;
        let timerId = null;
        let alarmIntervalId = null;
        let alarmType = 'sharp';
        let audioCtx = null;
        let isAlarming = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(freq, type, duration, vol = 0.2) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const display = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const testBtn = document.getElementById('testBtn');
        
        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.onclick = () => {
                if (isAlarming) return;
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                timeLeft = parseInt(btn.dataset.time);
                updateDisplay();
            };
        });

        function updateDisplay() {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        const sharpBtn = document.getElementById('sharpBtn');
        const gentleBtn = document.getElementById('gentleBtn');
        sharpBtn.onclick = () => { alarmType = 'sharp'; sharpBtn.classList.add('active'); gentleBtn.classList.remove('active'); };
        gentleBtn.onclick = () => { alarmType = 'gentle'; gentleBtn.classList.add('active'); sharpBtn.classList.remove('active'); };

        startBtn.onclick = () => {
            initAudio();
            if (isAlarming) {
                stopAlarm();
            } else {
                toggleTimer(false);
            }
        };

        testBtn.onclick = () => {
            if (isAlarming) return;
            initAudio();
            timeLeft = 5;
            updateDisplay();
            toggleTimer(true);
        };

        function toggleTimer(isTest) {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                startBtn.innerText = "再開する";
            } else {
                document.body.style.backgroundColor = "#0a0a0a";
                playSound(110, 'sine', 2, 0.1); 
                startBtn.innerText = isTest ? "テスト中..." : "休息中...";
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        timerId = null;
                        startAlarm();
                    }
                }, 1000);
            }
        }

        function startAlarm() {
            isAlarming = true;
            startBtn.innerText = "アラームを止める";
            startBtn.classList.add('alarm-active');
            document.body.style.backgroundColor = "#1a1a2e";

            // 音のループ開始
            alarmIntervalId = setInterval(() => {
                if (alarmType === 'sharp') {
                    playSound(880, 'triangle', 0.5, 0.3);
                } else {
                    playSound(330, 'sine', 1.5, 0.3);
                }
            }, alarmType === 'sharp' ? 800 : 2000);
        }

        function stopAlarm() {
            isAlarming = false;
            clearInterval(alarmIntervalId);
            startBtn.innerText = "意識をOFFにする";
            startBtn.classList.remove('alarm-active');
            document.body.style.backgroundColor = "#0a0a0a";
            // 時間を元の設定（選択されているボタンの時間）に戻す
            const activeTime = document.querySelector('.time-btn.active').dataset.time;
            timeLeft = parseInt(activeTime);
            updateDisplay();
        }
    </script>
</body>
</html>
